name: Deploy Edge Functions

on:
  push:
    branches:
      - main # Workflow akan dijalankan ketika ada push ke branch main
    paths:
      - 'supabase/functions/**' # Hanya dijalankan jika ada perubahan di folder functions

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy midtrans-token
        run: supabase functions deploy midtrans-token --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy midtrans-webhook
        run: supabase functions deploy midtrans-webhook --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy notify-chat
        run: supabase functions deploy notify-chat --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy notify-driver
        run: supabase functions deploy notify-driver --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy send-otp
        run: supabase functions deploy send-otp --project-ref $SUPABASE_PROJECT_ID

      - name: Deploy verify-otp
        run: supabase functions deploy verify-otp --project-ref $SUPABASE_PROJECT_ID
